                        "public_key": "{{ key_components.network.singbox.profiles.client.reality.public_key }}",
                        "short_id": "{{ key_components.network.singbox.profiles.client.reality.short_id }}"
                      }
                    }
                  },
                  {
                    "type": "direct",
                    "tag": "direct-out"
                  }
                ],
                "route": {
                  "auto_detect_interface": true,
                  "default_domain_resolver": "{{ key_components.network.singbox.vars.dns.primary.tag }}",
                  "final": "direct-out",
                  "rules": [
                    {
                      "inbound": ["socks-proxy", "mixed-proxy"],
                      "action": "route",
                      "outbound": "vless-out"
                    },
                    {
                      "inbound": ["socks-direct"],
                      "action": "route",
                      "outbound": "direct-out"
                    },
                    {
                      "inbound": ["tun-system"],
                      "action": "route",
                      "outbound": "vless-out"
                    }
                  ]
                },
                "experimental": {
                  "cache_file": {
                    "enabled": true,
                    "path": "{{ key_components.network.singbox.vars.cache_file }}"
                  }
                }
              }
            validate: "/bin/bash -lc 'mkdir -p /var/log/sing-box /var/lib/sing-box && /usr/bin/sing-box check -c \"$1\"' _ %s"
            notify: ["SINGBOX | apply"]
            log: true
          singbox_main_sing_box_service:
            use: true
            id: 3
            dir:
              desc: "/etc/systemd/system"
              owner: "root"
              group: "root"
              mode: "0755"
              apply:
                meta: { when: "always" }
            file:
              desc: "sing-box.service"
              owner: "root"
              group: "root"
              mode: "0644"
              apply:
                content: { when: "always", mode: "replace" }
                meta: { when: "always" }
            content: |
              [Unit]
              Description=sing-box service
              Documentation=https://sing-box.sagernet.org/
              After=network-online.target
              Wants=network-online.target

              [Service]
              Type=simple
              User=root
              ExecStart=/usr/bin/sing-box run -c {{ '/etc/sing-box/config.json' if key_components.network.singbox.tier == 'server' else '/etc/sing-box/client.json' }}
              ExecReload=/bin/kill -HUP $MAINPID
              Restart=on-failure
              RestartSec=5
              NoNewPrivileges=true
              AmbientCapabilities=CAP_NET_ADMIN CAP_NET_BIND_SERVICE
              CapabilityBoundingSet=CAP_NET_ADMIN CAP_NET_BIND_SERVICE
              LogsDirectory=sing-box
              StateDirectory=sing-box
              LimitNOFILE=1048576

              [Install]
              WantedBy=multi-user.target
            validate: "/usr/bin/systemd-analyze verify %s"
            notify: ["SINGBOX | apply"]
          singbox_client_main_resume_recover_script:
            use: "{{ key_components.network.singbox.tier == 'client' }}"
            id: 4
            dir:
              desc: "/usr/lib/systemd/system-sleep"
              owner: "root"
              group: "root"
              mode: "0755"
              apply:
                meta: { when: "always" }
            file:
              desc: "90_singbox_resume_recover"
              owner: "root"
              group: "root"
              mode: "0755"
              apply:
                content: { when: "always", mode: "replace" }
                meta: { when: "always" }
            content: |
              #!/bin/sh
              set -eu

              ACTION="${1:-}"

              case "${ACTION}" in
                post)
                  /bin/systemctl daemon-reload || true
                  /bin/systemctl restart sing-box.service || true
                  ;;
              esac
            notify: ["SINGBOX | apply"]
          singbox_iptables_912_singbox_rules_v4_rules: "{{ key_components.firewall.iptables.config.files.singbox_iptables_912_singbox_rules_v4_rules}}"
          singbox_logrotate_main_singbox: "{{ key_components.observability.logrotate.config.files.singbox_logrotate_main_singbox }}"
          singbox_fail2ban_main_jail_singbox_local: "{{ key_components.guard.fail2ban.config.files.singbox_fail2ban_main_jail_singbox_local }}"
          singbox_fail2ban_main_filter_singbox_conf: "{{ key_components.guard.fail2ban.config.files.singbox_fail2ban_main_filter_singbox_conf }}"
  firewall:
    stage: 1500
    iptables:
      enabled: false
      uses:
        packages: ["iptables"]
      config:
        files:
          iptables_base_rules_v4_base:
            use: true
            id: 1
            dir:
              desc: "/etc/iptables"
              owner: "root"
              group: "root"
              mode: "0755"
              apply: { meta: { when: "always" } }
            file:
              desc: "rules.v4.base"
              owner: "root"
              group: "root"
              mode: "0644"
              apply:
                content: { when: "always", mode: "replace" }
                meta: { when: "always" }
            content: |
              *filter
              :INPUT DROP [0:0]
              :FORWARD ACCEPT [0:0]
              :OUTPUT ACCEPT [0:0]

              -A INPUT -i lo -j ACCEPT
              -A INPUT -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT
              -A INPUT -p icmp -j ACCEPT
            notify: ["IPTABLES | apply"]
          ssh_iptables_910_ssh_rules_v4_rules:
            use: "{{ key_components.remote.ssh.enabled | bool }}"
            id: 2
            dir:
              desc: "/etc/iptables/rules.v4.d"
              owner: "root"
              group: "root"
              mode: "0755"
              apply:
                meta: { when: "always" }
            file:
              desc: "910_ssh_rules_v4.rules"
              owner: "root"
              group: "root"
              mode: "0644"
              apply:
                content: { when: "always", mode: "replace" }
                meta: { when: "always" }
            content: |
              -A INPUT -p tcp --dport {{ key_components.remote.ssh.vars.port }} -m conntrack --ctstate NEW -j ACCEPT
            notify: ["IPTABLES | apply"]
          wireguard_iptables_911_wireguard_rules_v4_rules:
            use: "{{ key_components.network.wireguard.enabled | bool }}"
            id: 3
            dir:
              desc: "/etc/iptables/rules.v4.d"
              owner: "root"
              group: "root"
              mode: "0755"
              apply: { meta: { when: "always" } }
            file:
              desc: "911_wireguard_rules_v4.rules"
              owner: "root"
              group: "root"
              mode: "0644"
              apply:
                content: { when: "always", mode: "replace" }
                meta: { when: "always" }
            content: |
              -A INPUT -i wg0 -j ACCEPT
              {% if key_components.network.wireguard.tier == 'server' %}
              -A INPUT -p udp --dport {{ key_components.network.wireguard.profiles.server.interface.listen_port }} -m conntrack --ctstate NEW -j ACCEPT
              -A FORWARD -i wg0 -o {{ key_components.network.wireguard.vars.nat.external_iface }} -j ACCEPT
              -A FORWARD -i {{ key_components.network.wireguard.vars.nat.external_iface }} -o wg0 -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT
              {% endif %}
            notify: ["IPTABLES | apply"]
          singbox_iptables_912_singbox_rules_v4_rules:
            use: "{{ key_components.network.singbox.enabled | bool }}"
            id: 11
            dir:
              desc: "/etc/iptables/rules.v4.d"
              owner: "root"
              group: "root"
              mode: "0755"
              apply:
                meta: { when: "always" }
            file:
              desc: "912_singbox_rules_v4.rules"
              owner: "root"
              group: "root"
              mode: "0644"
              apply:
                content: { when: "always", mode: "replace" }
                meta: { when: "always" }
            content: |
              {% if key_components.network.singbox.tier == 'server' %}
              -A INPUT -p tcp --dport {{ key_components.network.singbox.vars.listen_port }} -m conntrack --ctstate NEW -j ACCEPT
              {% endif %}

              {% if (key_components.network.singbox.tier == 'client') %}
              -A INPUT -i tun0 -j ACCEPT
              {% endif %}
            notify: ["IPTABLES | apply"]
          envoy_iptables_913_envoy_rules_v4_rules:
            use: "{{ key_components.platform_edge.envoy.enabled | bool }}"
            id: 12
            dir:
              desc: "/etc/iptables/rules.v4.d"
              owner: "root"
              group: "root"
              mode: "0755"
              apply:
                meta: { when: "always" }
            file:
              desc: "913_envoy_rules_v4.rules"
              owner: "root"
              group: "root"
              mode: "0644"
              apply:
                content: { when: "always", mode: "replace" }
                meta: { when: "always" }
            content: |
              {% if key_components.platform_edge.envoy.vars.tls.enabled | bool %}
              -A INPUT -p tcp --dport 443 -m conntrack --ctstate NEW -m limit --limit 200/second --limit-burst 400 -j ACCEPT
              {% endif %}
              -A INPUT -p tcp --dport 80 -m conntrack --ctstate NEW -m limit --limit 200/second --limit-burst 400 -j ACCEPT
            notify: ["IPTABLES | apply"]
          iptables_base_rules_v4_nat_base:
            use: true
            id: 10
            dir:
              desc: "/etc/iptables"
              owner: "root"
              group: "root"
              mode: "0755"
              apply: { meta: { when: "always" } }
            file:
              desc: "rules.v4.nat.base"
              owner: "root"
              group: "root"
              mode: "0644"
              apply:
                content: { when: "always", mode: "replace" }
                meta: { when: "always" }
            content: |
              *nat
              :PREROUTING ACCEPT [0:0]
              :INPUT ACCEPT [0:0]
              :OUTPUT ACCEPT [0:0]
              :POSTROUTING ACCEPT [0:0]
            notify: ["IPTABLES | apply"]
          wireguard_iptables_910_wireguard_rules_v4_nat_rules:
            use: "{{ (key_components.network.wireguard.enabled | bool) and key_components.network.wireguard.tier == 'server' }}"
            id: 11
            dir:
              desc: "/etc/iptables/rules.v4.nat.d"
              owner: "root"
              group: "root"
              mode: "0755"
              apply: { meta: { when: "always" } }
            file:
              desc: "910_wireguard_rules_v4_nat.rules"
              owner: "root"
              group: "root"
              mode: "0644"
              apply:
                content: { when: "always", mode: "replace" }
                meta: { when: "always" }
            content: |
              -A POSTROUTING -s {{ key_components.network.wireguard.vars.nat.source_subnet_v4 }} -o {{ key_components.network.wireguard.vars.nat.external_iface }} -j MASQUERADE
            notify: ["IPTABLES | apply"]

          iptables_base_rules_v4_mangle_base:
            use: true
            id: 20
            dir:
              desc: "/etc/iptables"
              owner: "root"
              group: "root"
              mode: "0755"
              apply: { meta: { when: "always" } }
            file:
              desc: "rules.v4.mangle.base"
              owner: "root"
              group: "root"
              mode: "0644"
              apply:
                content: { when: "always", mode: "replace" }
                meta: { when: "always" }
            content: |
              *mangle
              :PREROUTING ACCEPT [0:0]
              :INPUT ACCEPT [0:0]
              :FORWARD ACCEPT [0:0]
              :OUTPUT ACCEPT [0:0]
              :POSTROUTING ACCEPT [0:0]
            notify: ["IPTABLES | apply"]
          wireguard_iptables_910_wireguard_rules_v4_mangle_rules:
            use: "{{ (key_components.network.wireguard.enabled | bool) and key_components.network.wireguard.tier == 'server' }}"
            id: 21
            dir:
              desc: "/etc/iptables/rules.v4.mangle.d"
              owner: "root"
              group: "root"
              mode: "0755"
              apply: { meta: { when: "always" } }
            file:
              desc: "910_wireguard_rules_v4_mangle.rules"
              owner: "root"
              group: "root"
              mode: "0644"
              apply:
                content: { when: "always", mode: "replace" }
                meta: { when: "always" }
            content: |
              -A FORWARD -i wg0 -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --clamp-mss-to-pmtu
            notify: ["IPTABLES | apply"]

          iptables_base_rules_v6_base:
            use: true
            id: 30
            dir:
              desc: "/etc/iptables"
              owner: "root"
              group: "root"
              mode: "0755"
              apply: { meta: { when: "always" } }
            file:
              desc: "rules.v6.base"
              owner: "root"
              group: "root"
              mode: "0644"
              apply:
                content: { when: "always", mode: "replace" }
                meta: { when: "always" }
            content: |
              *filter
              :INPUT DROP [0:0]
              :FORWARD ACCEPT [0:0]
              :OUTPUT ACCEPT [0:0]
            notify: ["IPTABLES | apply"]
  guard:
    stage: 1600
    fail2ban:
      enabled: false
      uses:
        packages: ["fail2ban"]
      vars:
        defaults:
          maxretry: 5
          findtime: 600
          bantime: 86400
          ignoreip: ["127.0.0.1/8", "192.168.0.0/24", "10.10.0.0/16"]
          backend: "systemd"
          allowipv6: false
        recidive:
          enabled: false
          maxretry: 5
          findtime: 86400
          bantime: 604800
        sshd:
          maxretry: 5
          bantime: 86400
      config:
        files:
          fail2ban_main_fail2ban_local:
            use: "{{ key_components.guard.fail2ban.vars.recidive.enabled | bool }}"
            id: 1
            dir:
              desc: "/etc/fail2ban"
              owner: "root"
              group: "root"
              mode: "0755"
              apply:
                meta: { when: "always" }
            file:
              desc: "fail2ban.local"
              owner: "root"
              group: "root"
              mode: "0644"
              apply:
                content: { when: "always", mode: "replace" }
                meta: { when: "always" }
            content: |
              [Definition]
              dbfile = /var/lib/fail2ban/fail2ban.sqlite3
              dbpurgeage = 7d
              logtarget = SYSLOG
            validate: "/bin/bash -lc 'exit 0' _ %s"
            notify: ["FAIL2BAN | apply"]
          fail2ban_main_jail_local:
            use: true
            id: 2
            dir:
              desc: "/etc/fail2ban"
              owner: "root"
              group: "root"
              mode: "0755"
              apply:
                meta: { when: "always" }
            file:
              desc: "jail.local"
              owner: "root"
              group: "root"
              mode: "0644"
              apply:
                content: { when: "always", mode: "replace" }
                meta: { when: "always" }
            content: |
              [DEFAULT]
              backend = {{ key_components.guard.fail2ban.vars.defaults.backend }}
              allowipv6 = {{ 'true' if key_components.guard.fail2ban.vars.defaults.allowipv6 else 'false' }}
              usedns = warn
              ignoreself = true

              maxretry = {{ key_components.guard.fail2ban.vars.defaults.maxretry }}
              findtime = {{ key_components.guard.fail2ban.vars.defaults.findtime }}
              bantime = {{ key_components.guard.fail2ban.vars.defaults.bantime }}

              ignoreip = {{ key_components.guard.fail2ban.vars.defaults.ignoreip | join(' ') }}

              banaction = iptables-multiport
              banaction_allports = iptables-allports

              [recidive]
              enabled = {{ 'true' if key_components.guard.fail2ban.vars.recidive.enabled else 'false' }}
              action = iptables-allports[name=Recidive]
              port = all
              filter = recidive
              logpath = /var/log/fail2ban.log
              maxretry = {{ key_components.guard.fail2ban.vars.recidive.maxretry }}
              findtime = {{ key_components.guard.fail2ban.vars.recidive.findtime }}
              bantime = {{ key_components.guard.fail2ban.vars.recidive.bantime }}
            validate: "/bin/bash -lc 'if command -v fail2ban-client >/dev/null 2>&1; then fail2ban-client -t; else exit 0; fi' _ %s"
            notify: ["FAIL2BAN | apply"]
          ssh_fail2ban_main_jail_sshd_local:
            use: "{{ key_components.remote.ssh.enabled | bool }}"
            id: 3
            dir:
              desc: "/etc/fail2ban/jail.d"
              owner: "root"
              group: "root"
              mode: "0755"
              apply:
                meta: { when: "always" }
            file:
              desc: "sshd.local"
              owner: "root"
              group: "root"
              mode: "0644"
              apply:
                content: { when: "always", mode: "replace" }
                meta: { when: "always" }
            content: |
              [sshd]
              enabled = true
              action = iptables[name=SSH, port={{ key_components.remote.ssh.vars.port }}, protocol=tcp]
              port = {{ key_components.remote.ssh.vars.port }}
              filter = sshd
              backend = {{ key_components.guard.fail2ban.vars.defaults.backend }}
              journalmatch = _SYSTEMD_UNIT=ssh.service + _COMM=sshd
              mode = aggressive
              maxretry = {{ key_components.guard.fail2ban.vars.sshd.maxretry }}
              findtime = {{ key_components.guard.fail2ban.vars.defaults.findtime }}
              bantime = {{ key_components.guard.fail2ban.vars.sshd.bantime }}
            validate: "/bin/bash -lc 'if command -v fail2ban-client >/dev/null 2>&1; then fail2ban-client -t; else exit 0; fi' _ %s"
            notify: ["FAIL2BAN | apply"]
          singbox_fail2ban_main_jail_singbox_local:
            use: "{{ (key_components.network.singbox.enabled | bool) and (key_components.network.singbox.tier == 'server') }}"
            id: 13
            dir:
              desc: "/etc/fail2ban/jail.d"
              owner: "root"
              group: "root"
              mode: "0755"
              apply:
                meta: { when: "always" }
            file:
              desc: "sing-box.local"
              owner: "root"
              group: "root"
              mode: "0644"
              apply:
                content: { when: "always", mode: "replace" }
                meta: { when: "always" }
            content: |
              [sing-box]
              enabled = true
              action = iptables[name=sing-box, port={{ key_components.network.singbox.vars.listen_port }}, protocol=tcp]
              port = {{ key_components.network.singbox.vars.listen_port }}
              protocol = tcp
              filter = sing-box
              logpath = {{ key_components.network.singbox.vars.log_file }}
              backend = auto
              maxretry = 3
              findtime = 600
              bantime = 86400
            validate: "/bin/bash -lc 'if command -v fail2ban-client >/dev/null 2>&1; then fail2ban-client -t; else exit 0; fi' _ %s"
            notify: ["FAIL2BAN | apply"]
          singbox_fail2ban_main_filter_singbox_conf:
            use: "{{ (key_components.network.singbox.enabled | bool) and (key_components.network.singbox.tier == 'server') }}"
            id: 14
            dir:
              desc: "/etc/fail2ban/filter.d"
              owner: "root"
              group: "root"
              mode: "0755"
              apply:
                meta: { when: "always" }
            file:
              desc: "sing-box.conf"
              owner: "root"
              group: "root"
              mode: "0644"
              apply:
                content: { when: "always", mode: "replace" }
                meta: { when: "always" }
            content: |
              [Definition]
              failregex = ^.*inbound/vless.*from <HOST>:\d+.*(EOF|bad request|tls|reality).*$
              ignoreregex =
            notify: ["FAIL2BAN | apply"]
          envoy_fail2ban_main_jail_envoy_local:
            use: "{{ key_components.platform_edge.envoy.enabled | bool }}"
            id: 15
            dir:
              desc: "/etc/fail2ban/jail.d"
              owner: "root"
              group: "root"
              mode: "0755"
              apply:
                meta: { when: "always" }
            file:
              desc: "envoy.local"
              owner: "root"
              group: "root"
              mode: "0644"
              apply:
                content: { when: "always", mode: "replace" }
                meta: { when: "always" }
            content: |
              [envoy]
              enabled = true
              action = iptables-multiport[name=envoy, port="{{ 'http,https' if key_components.platform_edge.envoy.vars.tls.enabled | bool else 'http' }}", protocol=tcp]
              port = {{ 'http,https' if key_components.platform_edge.envoy.vars.tls.enabled | bool else 'http' }}
              filter = envoy
              backend = auto
              logpath = /var/log/envoy/*.log
              maxretry = 10
              findtime = 600
              bantime = 86400
            validate: "/bin/bash -lc 'if command -v fail2ban-client >/dev/null 2>&1; then fail2ban-client -t; else exit 0; fi' _ %s"
            notify: ["FAIL2BAN | apply"]
          envoy_fail2ban_main_filter_envoy_conf:
            use: "{{ key_components.platform_edge.envoy.enabled | bool }}"
            id: 16
            dir:
              desc: "/etc/fail2ban/filter.d"
              owner: "root"
              group: "root"
              mode: "0755"
              apply:
                meta: { when: "always" }
            file:
              desc: "envoy.conf"
              owner: "root"
              group: "root"
              mode: "0644"
              apply:
                content: { when: "always", mode: "replace" }
                meta: { when: "always" }
            content: |
              [Definition]
              failregex = ^\[[^\]]+\]\s+"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+\S+\s*"\s+(?:401|403)\s+\d+\s+"[^"]*"\s+"<HOST>(?::\d+)?"
                          ^\[[^\]]+\]\s+"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+/(?:wp-login\.php|xmlrpc\.php|wp-admin|\.env|\.git|phpmyadmin|admin|boaform|HNAP1|config\.php|setup\.php|vendor/|composer\.(?:json|lock))\S*\s*"\s+(?:400|401|403|404)\s+\d+\s+"[^"]*"\s+"<HOST>(?::\d+)?"
              ignoreregex =
            notify: ["FAIL2BAN | apply"]
  scan:
    stage: 1700
    clamav:
      enabled: false
      uses:
        packages: ["clamav"]
      vars:
        quarantine_dir: "/var/quarantine"
        log_dir: "/var/log/clamav"
        scan:
          enabled: false
          on_calendar: "*-*-* 01:00:00" # Etc/UTC
          randomized_delay_sec: 300
          persistent: true
        scan_dirs:
          - "/home"
          - "/root"
          - "/var/www"
          - "/var/tmp"
          - "/tmp"
          - "/etc"
          - "/usr/local"
          - "/opt"
          - "/data"
        freshclam_proxy:
          enabled: false
          server: "socks5h://127.0.0.1"
          port: 1081
      config:
        files:
          clamav_main_clamd_conf:
            use: true
            id: 1
            dir:
              desc: "/etc/clamav"
              owner: "root"
              group: "root"
              mode: "0755"
              apply: { meta: { when: "always" } }
            file:
              desc: "clamd.conf"
              owner: "root"
              group: "root"
              mode: "0644"
              apply:
                content: { when: "always", mode: "replace" }
                meta: { when: "always" }
            content: |
              LocalSocket /run/clamav/clamd.ctl
              FixStaleSocket true
              LocalSocketGroup clamav
              LocalSocketMode 660
              User clamav

              ScanMail true
              ScanArchive true
              ArchiveBlockEncrypted false
              MaxDirectoryRecursion 15
              FollowDirectorySymlinks false
              FollowFileSymlinks false

              ReadTimeout 180
              MaxThreads 12
              MaxConnectionQueueLength 15

              LogSyslog false
              LogRotate false
              LogFacility LOG_LOCAL6
              LogClean false
              LogVerbose false

              DatabaseDirectory /var/lib/clamav
              OfficialDatabaseOnly false
              SelfCheck 3600

              Foreground false
              Debug false

              ScanPE true
              MaxEmbeddedPE 10M
              ScanOLE2 true
              ScanPDF true
              ScanHTML true
              MaxHTMLNormalize 10M
              MaxHTMLNoTags 2M
              MaxScriptNormalize 5M
              MaxZipTypeRcg 1M
              ScanSWF true
              ExitOnOOM false
              LeaveTemporaryFiles false
              AlgorithmicDetection true
              ScanELF true
              IdleTimeout 30
              CrossFilesystems true

              PhishingSignatures true
              PhishingScanURLs true
              PhishingAlwaysBlockSSLMismatch false
              PhishingAlwaysBlockCloak false

              DetectPUA false
              ScanPartialMessages false
              HeuristicScanPrecedence false
              StructuredDataDetection false

              CommandReadTimeout 30
              SendBufTimeout 200
              MaxQueue 100

              ExtendedDetectionInfo true
              OLE2BlockMacros false
              AllowAllMatchScan true
              ForceToDisk false
              DisableCertCheck false
              DisableCache false

              MaxScanTime 120000
              MaxScanSize 100M
              MaxFileSize 25M
              MaxRecursion 16
              MaxFiles 10000
              MaxPartitions 50
              MaxIconsPE 100
              PCREMatchLimit 10000
              PCRERecMatchLimit 5000
              PCREMaxFileSize 25M
              ScanXMLDOCS true
              ScanHWP3 true
              MaxRecHWP3 16
              StreamMaxLength 25M

              LogFile {{ key_components.scan.clamav.vars.log_dir }}/clamav.log
              LogTime true
              LogFileUnlock false
              LogFileMaxSize 10M

              Bytecode true
              BytecodeSecurity TrustSigned
              BytecodeTimeout 60000

              OnAccessMaxFileSize 5M

              # If a virus is detected, move it to quarantine
              VirusEvent "mv --backup=numbered --force %F {{ key_components.scan.clamav.vars.quarantine_dir }}/"
            notify: ["CLAMAV | apply"]
          clamav_main_freshclam_conf:
            use: true
            id: 2
            dir:
              desc: "/etc/clamav"
              owner: "root"
              group: "root"
              mode: "0755"
              apply: { meta: { when: "always" } }
            file:
              desc: "freshclam.conf"
              owner: "root"
              group: "root"
              mode: "0644"
              apply:
                content: { when: "always", mode: "replace" }
                meta: { when: "always" }
            content: |
              DatabaseOwner clamav
              UpdateLogFile {{ key_components.scan.clamav.vars.log_dir }}/freshclam.log
              LogVerbose false
              LogSyslog false
              LogFacility LOG_LOCAL6
              LogFileMaxSize 0
              LogRotate false
              LogTime true
              Foreground false
              Debug false

              MaxAttempts 5
              DatabaseDirectory /var/lib/clamav
              DNSDatabaseInfo current.cvd.clamav.net
              ConnectTimeout 30
              ReceiveTimeout 0
              TestDatabases no
              ScriptedUpdates yes
              CompressLocalDatabase no

              Bytecode true
              NotifyClamd /etc/clamav/clamd.conf

              # Check 2 times a day
              Checks 2

              DatabaseMirror db.local.clamav.net
              DatabaseMirror database.clamav.net

              {% if
                (key_components.scan.clamav.vars.freshclam_proxy.enabled | bool) and
                (key_components.remote.ssh_client.enabled | bool) and
                (key_components.remote.ssh_client.vars.socks.enabled | bool)
              %}
              HTTPProxyServer {{ key_components.scan.clamav.vars.freshclam_proxy.server }}
              HTTPProxyPort {{ key_components.scan.clamav.vars.freshclam_proxy.port }}
              {% endif %}
            notify: ["CLAMAV | apply"]
          clamav_main_clamav_scan_sh:
            use: "{{ key_components.scan.clamav.vars.scan.enabled | bool }}"
            id: 3
            dir:
              desc: "/usr/local/bin"
              owner: "root"
              group: "root"
              mode: "0755"
              apply: { meta: { when: "always" } }
            file:
              desc: "clamav_scan.sh"
              owner: "root"
              group: "root"
              mode: "0755"
              apply:
                content: { when: "always", mode: "replace" }
                meta: { when: "always" }
            content: |
              #!/bin/bash
              set -euo pipefail

              SCAN_DIRS="{{ key_components.scan.clamav.vars.scan_dirs | join(' ') }}"
              LOG_DIR="{{ key_components.scan.clamav.vars.log_dir }}"
              QUARANTINE_DIR="{{ key_components.scan.clamav.vars.quarantine_dir }}"

              DATE_TIME="$(date -u +'%Y')"
              LOG_FILE="${LOG_DIR}/scan_${DATE_TIME}.log"

              mkdir -p -m 750 "${LOG_DIR}"
              chown clamav:clamav "${LOG_DIR}" || true

              mkdir -p -m 750 "${QUARANTINE_DIR}"
              chown clamav:clamav "${QUARANTINE_DIR}" || true

              echo "Start event $(date -u +'%Y-%m-%d %T')" >> "${LOG_FILE}"
              echo "Full system scan" >> "${LOG_FILE}"

              for DIR in ${SCAN_DIRS}; do
                if [ -d "${DIR}" ]; then
                  echo "[$(date -u +'%Y-%m-%d %T')] Scanning: ${DIR}" >> "${LOG_FILE}"
                  /usr/bin/clamscan -ri --move="${QUARANTINE_DIR}" "${DIR}" >> "${LOG_FILE}" || true
                else
                  echo "[$(date -u +'%Y-%m-%d %T')] Missing dir: ${DIR}" >> "${LOG_FILE}"
                fi
              done

              echo "End event $(date -u +'%Y-%m-%d %T')" >> "${LOG_FILE}"
              echo "" >> "${LOG_FILE}"
            validate: "/bin/bash -n %s"
            notify: ["CLAMAV | apply"]
          clamav_main_clamav_scan_service:
            use: "{{ key_components.scan.clamav.vars.scan.enabled | bool }}"
            id: 4
            dir:
              desc: "/etc/systemd/system"
              owner: "root"
              group: "root"
              mode: "0755"
              apply: { meta: { when: "always" } }
            file:
              desc: "clamav-scan.service"
              owner: "root"
              group: "root"
              mode: "0644"
              apply:
                content: { when: "always", mode: "replace" }
                meta: { when: "always" }
            content: |
              [Unit]
              Description=ClamAV scan
              After=network-online.target
              Wants=network-online.target

              [Service]
              Type=oneshot
              ExecStart=/usr/local/bin/clamav_scan.sh
              Nice=10
              IOSchedulingClass=idle
              NoNewPrivileges=true
            notify: ["CLAMAV | apply"]
          clamav_main_clamav_scan_timer:
            use: "{{ key_components.scan.clamav.vars.scan.enabled | bool }}"
            id: 5
            dir:
              desc: "/etc/systemd/system"
              owner: "root"
              group: "root"
              mode: "0755"
              apply: { meta: { when: "always" } }
            file:
              desc: "clamav_scan.timer"
              owner: "root"
              group: "root"
              mode: "0644"
              apply:
                content: { when: "always", mode: "replace" }
                meta: { when: "always" }
            content: |
              [Unit]
              Description=ClamAV scan timer

              [Timer]
              OnCalendar={{ key_components.scan.clamav.vars.scan.on_calendar }}
              Persistent={{ 'true' if key_components.scan.clamav.vars.scan.persistent else 'false' }}
              RandomizedDelaySec={{ key_components.scan.clamav.vars.scan.randomized_delay_sec }}

              [Install]
              WantedBy=timers.target
            notify: ["CLAMAV | apply"]
          clamav_freshclam_910_freshclam_ssh_socks_conf:
            use: >-
              {{
                (key_components.scan.clamav.vars.freshclam_proxy.enabled |  bool) and
                (key_components.remote.ssh_client.enabled | bool) and
                (key_components.remote.ssh_client.vars.socks.enabled | bool)
              }}
            id: 6
            dir:
              desc: "/etc/systemd/system/clamav-freshclam.service.d"
              owner: "root"
              group: "root"
              mode: "0755"
              apply: { meta: { when: "always" } }
            file:
              desc: "910_freshclam_ssh_socks.conf"
              owner: "root"
              group: "root"
              mode: "0644"
              apply:
                content: { when: "always", mode: "replace" }
                meta: { when: "always" }
            content: |
              [Unit]
              After=ssh_rpf.service
              Wants=ssh_rpf.service
            notify: ["CLAMAV | apply"]
          clamav_logrotate_main_clamav: "{{ key_components.observability.logrotate.config.files.clamav_logrotate_main_clamav }}"
