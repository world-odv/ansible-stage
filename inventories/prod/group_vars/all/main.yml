ansible_port: 22

key_updates: # common
  apt:
    enabled: false
    update_cache: false
    upgrade: false
    autoremove: false
  snap:
    enabled: false
    refresh: false
    cleanup_old_revisions: false

key_system: # common
  users:
    root:
      lock: false
    admin:
      login: "vault.xml"
      password: "vault.xml"
      sudo_timeout: 120
      groups: ["sudo", "adm"]
  hostname:
    enabled: false
  locale:
    enabled: false
    langs: ["en"]
  timezone:
    enabled: false
    shift: "utc-0"
  keyboard:
    enabled: false
    gnome:
      toggle: "grp:alt_shift_toggle"

key_components:
  common:
    stage: 100
    base:
      enabled: false
      uses: { packages: ["procps", "curl", "wget", "vim", "iptables"] }
  workstation:
    stage: 200
    nextcloud_desktop:
      enabled: false
      uses: { packages: ["nextcloud_desktop"] }
    libreoffice:
      enabled: false
      uses: { packages: ["libreoffice"] }
    visual_studio_code:
      enabled: false
      uses: { packages: ["visual_studio_code"] }
    ansible:
      enabled: false
      uses: { packages: ["ansible"] }
  custom:
    stage: 300
    firefox:
      enabled: false
      uses: { packages: ["firefox"] }
    opera:
      enabled: false
      uses: { packages: ["opera"] }
    veracrypt:
      enabled: false
      uses: { packages: ["veracrypt"] }
    keepassxc:
      enabled: false
      uses: { packages: ["keepassxc"] }
    obsidian:
      enabled: false
      uses: { packages: ["obsidian"] }
    telegram:
      enabled: false
      uses: { packages: ["telegram"] }
    vlc:
      enabled: false
      uses: { packages: ["vlc"] }
    tlp:
      enabled: false
      uses: { packages: ["tlp"] }
      config:
        files:
          tlp_main_tlp:
            use: true
            id: 1
            dir:
              desc: "/etc/default"
              owner: "root"
              group: "root"
              mode: "0755"
              apply:
                meta: { when: "always" }
            file:
              desc: "tlp"
              owner: "root"
              group: "root"
              mode: "0644"
              apply:
                content: { when: "always", mode: "replace" }
                meta: { when: "always" }
            content: |
              START_CHARGE_THRESH_BAT0=20
              STOP_CHARGE_THRESH_BAT0=80
            notify: ["TLP | apply"]
  remote:
    stage: 1000
    ssh:
      enabled: false
      uses:
        packages: ["openssh_server"]
      vars:
        port: "{{ ansible_port }}"
        allow_users: ["{{ key_system.users.admin.login }}"]
        rpf:
          enabled: false
          user: "rpf"
          gateway_ports: "clientspecified"
          public_keys: ["vault.xml"]
          permit_listen:
            - "vault.xml"
      config:
        files:
          ssh_main_sshd_config:
            use: true
            id: 1
            dir:
              desc: "/etc/ssh"
              owner: "root"
              group: "root"
              mode: "0755"
              apply:
                meta: { when: "always" }
            file:
              desc: "sshd_config"
              owner: "root"
              group: "root"
              mode: "0644"
              apply:
                content: { when: "always", mode: "replace" }
                meta: { when: "always" }
            content: |
              #Include /etc/ssh/sshd_config.d/*.conf

              Protocol 2
              Port {{ key_components.remote.ssh.vars.port }}

              AddressFamily inet
              ListenAddress 0.0.0.0

              {% if key_components.remote.ssh.vars.rpf.enabled | bool %}
              AllowUsers {{ (key_components.remote.ssh.vars.allow_users + [key_components.remote.ssh.vars.rpf.user]) | unique | join(' ') }}
              {% else %}
              AllowUsers {{ key_components.remote.ssh.vars.allow_users | unique | join(' ') }}
              {% endif %}

              PermitRootLogin no

              PasswordAuthentication no
              PermitEmptyPasswords no

              PermitTunnel no
              X11Forwarding no

              ChallengeResponseAuthentication no
              KbdInteractiveAuthentication no

              MaxAuthTries 3

              ClientAliveInterval 120
              ClientAliveCountMax 3

              UsePAM yes
              PrintMotd no
              PrintLastLog yes

              AcceptEnv LANG LC_*

              Subsystem sftp /usr/lib/openssh/sftp-server

              AllowTcpForwarding no
              GatewayPorts no

              {% if key_components.remote.ssh.vars.rpf.enabled | bool %}
              Match User {{ key_components.remote.ssh.vars.rpf.user }}
                AllowTcpForwarding yes
                GatewayPorts {{ key_components.remote.ssh.vars.rpf.gateway_ports }}
                X11Forwarding no
                AllowAgentForwarding no
                PermitTunnel no
                PermitTTY no
                {% if key_components.remote.ssh.vars.rpf.permit_listen | default([]) | length > 0 %}
                PermitListen {{ key_components.remote.ssh.vars.rpf.permit_listen | join(' ') }}
                {% endif %}
              {% endif %}
            validate: "/usr/sbin/sshd -t -f %s"
            notify: ["SSH | apply"]
          ssh_iptables_910_ssh_rules_v4_rules: "{{ key_components.firewall.iptables.config.files.ssh_iptables_910_ssh_rules_v4_rules }}"
          ssh_fail2ban_main_jail_sshd_local: "{{ key_components.guard.fail2ban.config.files.ssh_fail2ban_main_jail_sshd_local }}"
    ssh_client:
      enabled: false
      uses:
        packages: ["openssh_client"]
      vars:
        service_user: "{{ key_system.users.admin.login }}"
        remote_user: "rpf"
        remote_host: "vault.xml"
        remote_port: "vault.xml"
        private_key_file: "vault.xml"
        rpf:
          enabled: false
          forwards: ["vault.xml"]
        socks:
          enabled: false
          bind: "127.0.0.1"
          port: 1081
      config:
        files:
          ssh_client_main_ssh_rpf_env:
            use: "{{ (key_components.remote.ssh_client.vars.rpf.enabled or key_components.remote.ssh_client.vars.socks.enabled) | bool }}"
            id: 1
            dir:
              desc: "/etc/ssh_rpf"
              owner: "root"
              group: "root"
              mode: "0755"
              apply:
                meta: { when: "always" }
            file:
              desc: "ssh_rpf.env"
              owner: "root"
              group: "root"
              mode: "0644"
              apply:
                content: { when: "always", mode: "replace" }
                meta: { when: "always" }
            content: |
              SSH_USER="{{ key_components.remote.ssh_client.vars.remote_user }}"
              SSH_HOST="{{ key_components.remote.ssh_client.vars.remote_host }}"
              SSH_PORT="{{ key_components.remote.ssh_client.vars.remote_port }}"
              SSH_KEY="{{ key_components.remote.ssh_client.vars.private_key_file }}"

              SOCKS_ENABLED="{{ '1' if key_components.remote.ssh_client.vars.socks.enabled else '0' }}"
              SOCKS_BIND="{{ key_components.remote.ssh_client.vars.socks.bind }}"
              SOCKS_PORT="{{ key_components.remote.ssh_client.vars.socks.port }}"

              RPF_ENABLED="{{ '1' if key_components.remote.ssh_client.vars.rpf.enabled else '0' }}"
              RPF_FORWARDS="{{ key_components.remote.ssh_client.vars.rpf.forwards | join(' ') }}"
            notify: ["SSH RPF | apply"]
          ssh_client_main_ssh_rpf_sh:
            use: "{{ (key_components.remote.ssh_client.vars.rpf.enabled or key_components.remote.ssh_client.vars.socks.enabled) | bool }}"
            id: 2
            dir:
              desc: "/usr/local/bin"
              owner: "root"
              group: "root"
              mode: "0755"
              apply:
                meta: { when: "always" }
            file:
              desc: "ssh_rpf.sh"
              owner: "root"
              group: "root"
              mode: "0755"
              apply:
                content: { when: "always", mode: "replace" }
                meta: { when: "always" }
            content: |
              #!/usr/bin/env bash
              set -euo pipefail

              ENV_FILE="/etc/ssh_rpf/ssh_rpf.env"
              if [ -r "${ENV_FILE}" ]; then
                # shellcheck disable=SC1090
                . "${ENV_FILE}"
              fi

              : "${SSH_USER:?Missing SSH_USER}"
              : "${SSH_HOST:?Missing SSH_HOST}"
              : "${SSH_PORT:?Missing SSH_PORT}"
              : "${SSH_KEY:?Missing SSH_KEY}"

              SOCKS_ENABLED="${SOCKS_ENABLED:-0}"
              SOCKS_BIND="${SOCKS_BIND:-127.0.0.1}"
              SOCKS_PORT="${SOCKS_PORT:-1081}"

              RPF_ENABLED="${RPF_ENABLED:-0}"
              RPF_FORWARDS="${RPF_FORWARDS:-}"

              if [ "${SOCKS_ENABLED}" != "1" ] && [ "${RPF_ENABLED}" != "1" ]; then
                echo "Nothing to do: SOCKS_ENABLED=0 and RPF_ENABLED=0" >&2
                exit 1
              fi

              CMD=(
                ssh
                -o "IdentitiesOnly=yes"
                -o "ExitOnForwardFailure=yes"
                -o "ServerAliveInterval=30"
                -o "ServerAliveCountMax=3"
                -o "TCPKeepAlive=yes"
                -o "StrictHostKeyChecking=accept-new"
                -i "${SSH_KEY}"
                -p "${SSH_PORT}"
                -N
              )

              if [ "${SOCKS_ENABLED}" = "1" ]; then
                CMD+=(-D "${SOCKS_BIND}:${SOCKS_PORT}")
              fi

              if [ "${RPF_ENABLED}" = "1" ]; then
                for FWD in ${RPF_FORWARDS}; do
                  CMD+=(-R "${FWD}")
                done
              fi

              CMD+=("${SSH_USER}@${SSH_HOST}")

              echo "Start event $(date -u +'%Y-%m-%d %T')"
              echo "Command:"
              printf ' %q' "${CMD[@]}"; echo

              exec "${CMD[@]}"
            validate: "/bin/bash -n %s"
            notify: ["SSH RPF | apply"]
          ssh_client_main_ssh_rpf_service:
            use: "{{ (key_components.remote.ssh_client.vars.rpf.enabled or key_components.remote.ssh_client.vars.socks.enabled) | bool }}"
            id: 3
            dir:
              desc: "/etc/systemd/system"
              owner: "root"
              group: "root"
              mode: "0755"
              apply:
                meta: { when: "always" }
            file:
              desc: "ssh_rpf.service"
              owner: "root"
              group: "root"
              mode: "0644"
              apply:
                content: { when: "always", mode: "replace" }
                meta: { when: "always" }
            content: |
              [Unit]
              Description=SSH RPF / SOCKS tunnel
              After=network-online.target
              Wants=network-online.target

              [Service]
              Type=simple
              User={{ key_components.remote.ssh_client.vars.service_user }}
              Environment="HOME=/home/{{ key_components.remote.ssh_client.vars.service_user }}"
              EnvironmentFile=/etc/ssh_rpf/ssh_rpf.env
              ExecStart=/usr/local/bin/ssh_rpf.sh
              Restart=always
              RestartSec=10
              NoNewPrivileges=true

              StandardOutput=journal
              StandardError=journal

              [Install]
              WantedBy=multi-user.target
            notify: ["SSH RPF | apply"]
  kernel:
    stage: 1100
    grub:
      enabled: false
      uses:
        packages: ["grub2_common"]
      vars:
        user_login: "vault.xml"
        password_hash: "vault.xml"
        timeout_style: "hidden"
        timeout: 0
        disable_recovery: true
      config:
        files:
          grub_main_grub:
            use: true
            id: 1
            dir:
              desc: "/etc/default"
              owner: "root"
              group: "root"
              mode: "0755"
              apply:
                meta: { when: "always" }
            file:
              desc: "grub"
              owner: "root"
              group: "root"
              mode: "0644"
              apply:
                content: { when: "exists", mode: "regex" }
                meta: { when: "exists" }
            content: |
              [
                { "id": 10, "regex": "^\\s*#?\\s*GRUB_TIMEOUT_STYLE=",    "value": "GRUB_TIMEOUT_STYLE={{ key_components.kernel.grub.vars.timeout_style }}" },
                { "id": 20, "regex": "^\\s*#?\\s*GRUB_TIMEOUT=",          "value": "GRUB_TIMEOUT={{ key_components.kernel.grub.vars.timeout }}" },
                { "id": 30, "regex": "^\\s*#?\\s*GRUB_DISABLE_RECOVERY=", "value": "GRUB_DISABLE_RECOVERY=\\\"{{ 'true' if key_components.kernel.grub.vars.disable_recovery else 'false' }}\\\"" }
              ]
            validate: "/bin/bash -n %s"
            notify: ["GRUB | apply"]
          grub_910_grub_password:
            use: true
            id: 2
            dir:
              desc: "/etc/grub.d"
              owner: "root"
              group: "root"
              mode: "0755"
              apply:
                meta: { when: "always" }
            file:
              desc: "910_grub_password"
              owner: "root"
              group: "root"
              mode: "0700"
              apply:
                content: { when: "always", mode: "replace" }
                meta: { when: "always" }
            content: |
              #!/bin/sh
              set -e

              cat << EOF
              set superusers="{{ key_components.kernel.grub.vars.user_login }}"
              password_pbkdf2 {{ key_components.kernel.grub.vars.user_login }} {{ key_components.kernel.grub.vars.password_hash }}
              EOF
            validate: "/bin/sh -n %s"
            notify: ["GRUB | apply"]
    sysctl:
      enabled: false
      uses:
        packages: ["procps"]
      config:
        files:
          sysctl_main_sysctl_conf:
            use: true
            id: 1
            dir:
              desc: "/etc"
              owner: "root"
              group: "root"
              mode: "0755"
              apply:
                meta: { when: "always" }
            file:
              desc: "sysctl.conf"
              owner: "root"
              group: "root"
              mode: "0644"
              apply:
                content: { when: "always", mode: "replace" }
                meta: { when: "always" }
            content: |
              # SYN / basic DoS hardening
              net.ipv4.tcp_syncookies = 1

              # ICMP (keep ping, block broadcast ping)
              net.ipv4.icmp_echo_ignore_broadcasts = 1
              net.ipv4.icmp_ratelimit = 200
              net.ipv4.icmp_ratemask = 88089

              # IPv4 hardening (redirects, source route)
              net.ipv4.conf.all.rp_filter = 1
              net.ipv4.conf.default.rp_filter = 1

              net.ipv4.conf.all.accept_redirects = 0
              net.ipv4.conf.default.accept_redirects = 0
              net.ipv4.conf.all.secure_redirects = 0
              net.ipv4.conf.default.secure_redirects = 0

              net.ipv4.conf.all.accept_source_route = 0
              net.ipv4.conf.default.accept_source_route = 0

              net.ipv4.conf.all.send_redirects = 0
              net.ipv4.conf.default.send_redirects = 0

              net.ipv4.conf.all.log_martians = 1
              net.ipv4.conf.default.log_martians = 1

              #net.ipv4.ip_forward = 0
              #net.ipv4.conf.all.src_valid_mark = 0

              # IPv6 redirects hardening (safe even if IPv6 will be enabled later)
              net.ipv6.conf.all.accept_redirects = 0
              net.ipv6.conf.default.accept_redirects = 0

              # Kernel info leak hardening
              kernel.dmesg_restrict = 1
              kernel.kptr_restrict = 2

              # Symlink/hardlink protections
              fs.protected_symlinks = 1
              fs.protected_hardlinks = 1
              fs.protected_fifos = 2
              fs.protected_regular = 2

              # Kernel hardening
              dev.tty.ldisc_autoload = 0
              fs.suid_dumpable = 0
              kernel.perf_event_paranoid = 2
              kernel.unprivileged_bpf_disabled = 1
              net.core.bpf_jit_harden = 2
            validate: "/bin/bash -lc 'bad=$(grep -nEv \"^[[:space:]]*($|#|;)\" \"$1\" | grep -nEv \"^[0-9]+:[[:space:]]*[A-Za-z0-9_.]+[[:space:]]*=[[:space:]]*.+$\" || true); if [ -n \"$bad\" ]; then echo \"$bad\" >&2; exit 1; fi' _ %s"
            notify: ["SYSCTL | apply"]
          wireguard_sysctl_main_sysctl_conf:
            use: "{{ key_components.network.wireguard.enabled | bool }}"
            id: 2
            dir:
              desc: "/etc"
              owner: "root"
              group: "root"
              mode: "0755"
              apply: { meta: { when: "exists" } }
            file:
              desc: "sysctl.conf"
              owner: "root"
              group: "root"
              mode: "0644"
              apply:
                content: { when: "exists", mode: "regex" }
                meta: { when: "exists" }
            content: |
              [
                {
                  "id": 1,
                  "regex": "^\\s*#?\\s*net\\.ipv4\\.conf\\.all\\.src_valid_mark\\s*=\\s*.*$",
                  "value": "net.ipv4.conf.all.src_valid_mark = 1"
                },
                {
                  "id": 2,
                  "regex": "^\\s*#?\\s*net\\.ipv4\\.conf\\.all\\.rp_filter\\s*=\\s*.*$",
                  "value": "net.ipv4.conf.all.rp_filter = 2"
                },
                {
                  "id": 3,
                  "regex": "^\\s*#?\\s*net\\.ipv4\\.conf\\.default\\.rp_filter\\s*=\\s*.*$",
                  "value": "net.ipv4.conf.default.rp_filter = 2"
                }

                {% if key_components.network.wireguard.tier == 'server' %}
                ,
                {
                  "id": 4,
                  "regex": "^\\s*#?\\s*net\\.ipv4\\.ip_forward\\s*=\\s*.*$",
                  "value": "net.ipv4.ip_forward = 1"
                }
                {% endif %}
              ]
            validate: "/bin/bash -lc 'bad=$(grep -nEv \"^[[:space:]]*($|#|;)\" \"$1\" | grep -nEv \"^[0-9]+:[[:space:]]*[A-Za-z0-9_.]+[[:space:]]*=[[:space:]]*.+$\" || true); if [ -n \"$bad\" ]; then echo \"$bad\" >&2; exit 1; fi' _ %s"
            notify: ["SYSCTL | apply"]
  observability:
    stage: 1200
    journald:
      enabled: false
      uses:
        packages: ["systemd"]
      tier: "mid"
      profiles:
        mid:
          SystemMaxUse: "1G"
          SystemKeepFree: "500M"
          SystemMaxFileSize: "200M"
          SystemMaxFiles: "20"
          RuntimeMaxUse: "128M"
          MaxRetentionSec: "1month"
          RateLimitIntervalSec: "30s"
          RateLimitBurst: "2000"
          MaxLevelStore: "info"
      config:
        files:
          journald_main_journald_conf:
            use: true
            id: 1
            dir:
              desc: "/etc/systemd"
              owner: "root"
              group: "root"
              mode: "0755"
              apply:
                meta: { when: "always" }
            file:
              desc: "journald.conf"
              owner: "root"
              group: "root"
              mode: "0644"
              apply:
                content: { when: "always", mode: "replace" }
                meta: { when: "always" }
            content: |
              [Journal]
              Storage=persistent
              Compress=yes

              SystemMaxUse={{ key_components.observability.journald.profiles[key_components.observability.journald.tier].SystemMaxUse }}
              SystemKeepFree={{ key_components.observability.journald.profiles[key_components.observability.journald.tier].SystemKeepFree }}
              SystemMaxFileSize={{ key_components.observability.journald.profiles[key_components.observability.journald.tier].SystemMaxFileSize }}
              SystemMaxFiles={{ key_components.observability.journald.profiles[key_components.observability.journald.tier].SystemMaxFiles }}
              RuntimeMaxUse={{ key_components.observability.journald.profiles[key_components.observability.journald.tier].RuntimeMaxUse }}
              MaxRetentionSec={{ key_components.observability.journald.profiles[key_components.observability.journald.tier].MaxRetentionSec }}

              RateLimitIntervalSec={{ key_components.observability.journald.profiles[key_components.observability.journald.tier].RateLimitIntervalSec }}
              RateLimitBurst={{ key_components.observability.journald.profiles[key_components.observability.journald.tier].RateLimitBurst }}
              MaxLevelStore={{ key_components.observability.journald.profiles[key_components.observability.journald.tier].MaxLevelStore }}

              ForwardToSyslog=no
              ForwardToKMsg=no
              ForwardToConsole=no
              ForwardToWall=no
            validate: "/usr/bin/python3 -c \"import configparser,sys; p=configparser.ConfigParser(); p.read(sys.argv[1])\" %s"
            notify: ["JOURNALD | apply"]
    logrotate:
      enabled: false
      uses:
        packages: ["logrotate"]
      tier: "mid"
      profiles:
        mid:
          frequency: "weekly"
          rotate: 4
          maxsize: "50M"
      config:
        files:
          logrotate_main_logrotate_conf:
            use: true
            id: 1
            dir:
              desc: "/etc"
              owner: "root"
              group: "root"
              mode: "0755"
              apply:
                meta: { when: "always" }
            file:
              desc: "logrotate.conf"
              owner: "root"
              group: "root"
              mode: "0644"
              apply:
                content: { when: "always", mode: "replace" }
                meta: { when: "always" }
            content: |
              notifempty
              missingok

              {{ key_components.observability.logrotate.profiles[key_components.observability.logrotate.tier].frequency }}
              rotate {{ key_components.observability.logrotate.profiles[key_components.observability.logrotate.tier].rotate }}
              maxsize {{ key_components.observability.logrotate.profiles[key_components.observability.logrotate.tier].maxsize }}

              compress
              delaycompress
              dateext

              create 0640 root adm
              su root adm

              include /etc/logrotate.d
            validate: "logrotate -d %s"
            notify: ["LOGROTATE | apply"]
          clamav_logrotate_main_clamav:
            use: "{{ key_components.scan.clamav.enabled | bool }}"
            id: 2
            dir:
              desc: "/etc/logrotate.d"
              owner: "root"
              group: "root"
              mode: "0755"
              apply: { meta: { when: "always" } }
            file:
              desc: "clamav"
              owner: "root"
              group: "root"
              mode: "0644"
              apply:
                content: { when: "always", mode: "replace" }
                meta: { when: "always" }
            content: |
              {{ key_components.scan.clamav.vars.log_dir }}/*.log {
                  notifempty
                  monthly
                  size 50M
                  rotate 12
                  missingok
                  compress
                  delaycompress
                  dateext
                  su root adm
                  create 0640 clamav adm

                  postrotate
                      if [ -d /run/systemd/system ]; then
                          systemctl -q is-active clamav-daemon && systemctl kill --signal=SIGHUP clamav-daemon || true
                          systemctl -q is-active clamav-freshclam && systemctl kill --signal=SIGHUP clamav-freshclam || true
                      else
                          invoke-rc.d clamav-daemon reload-log > /dev/null || true
                          invoke-rc.d clamav-freshclam reload-log > /dev/null || true
                      fi
                  endscript
              }
            notify: ["LOGROTATE | apply"]
          singbox_logrotate_main_singbox:
            use: "{{ key_components.network.singbox.enabled | bool }}"
            id: 10
            dir:
              desc: "/etc/logrotate.d"
              owner: "root"
              group: "root"
              mode: "0755"
              apply:
                meta: { when: "always" }
            file:
              desc: "sing-box"
              owner: "root"
              group: "root"
              mode: "0644"
              apply:
                content: { when: "always", mode: "replace" }
                meta: { when: "always" }
            content: |
              {{ key_components.network.singbox.vars.log_file }} {
                  notifempty
                  monthly
                  size 50M
                  rotate 12
                  missingok
                  compress
                  delaycompress
                  dateext
                  copytruncate
                  su root adm
                  create 0640 root adm
              }
            notify: ["LOGROTATE | apply"]
          envoy_logrotate_main_envoy:
            use: "{{ key_components.platform_edge.envoy.enabled | bool }}"
            id: 11
            dir:
              desc: "/etc/logrotate.d"
              owner: "root"
              group: "root"
              mode: "0755"
              apply:
                meta: { when: "always" }
            file:
              desc: "envoy"
              owner: "root"
              group: "root"
              mode: "0644"
              apply:
                content: { when: "always", mode: "replace" }
                meta: { when: "always" }
            content: |
              /var/log/envoy/*.log {
                  notifempty
                  daily
                  minsize 100k
                  size 50M
                  rotate 14
                  missingok
                  compress
                  delaycompress
                  dateext
                  su root adm
                  create 0640 envoy envoy
                  postrotate
                      curl -s -X POST http://{{ key_components.platform_edge.envoy.vars.admin_bind_address }}:{{ key_components.platform_edge.envoy.vars.admin_port }}/reopen_logs >/dev/null 2>&1 || true
                  endscript
              }
            notify: ["LOGROTATE | apply"]
  backup:
    stage: 1300
    timeshift:
      enabled: false
      uses:
        packages: ["timeshift"]
      tier: "mid"
      profiles:
        mid:
          schedule_monthly: true
          schedule_weekly: true
          schedule_daily: true
          count_monthly: "6"
          count_weekly: "4"
          count_daily: "7"
      vars:
        backup_device_uuid: "auto"
        exclude_common:
          - "/home/**"
          - "**/*.log"
          - "**/*.tmp"
          - "/tmp/**"
          - "/var/log/**"
          - "/var/tmp/**"
          - "/var/cache/**"
          - "/var/spool/**"
          - "/var/lib/apt/lists/**"
          - "/var/cache/apt/**"
          - "/var/lib/snapd/snaps/**"
          - "/var/lib/flatpak/**"
          - "/var/lib/systemd/coredump/**"
          - "/var/lib/docker/**"
          - "/var/lib/containers/**"
          - "/var/lib/libvirt/images/**"
          - "/var/snap/**"
          - "/snap/**"
          - "/swapfile"
          - "/root/**"
      config:
        files:
          timeshift_main_timeshift_json:
            use: true
            id: 1
            dir:
              desc: "/etc/timeshift"
              owner: "root"
              group: "root"
              mode: "0755"
              apply:
                meta: { when: "always" }
            file:
              desc: "timeshift.json"
              owner: "root"
              group: "root"
              mode: "0644"
              apply:
                content:
                  when: "always" # never | missing (set rights when creating) | exists | always
                  mode: "replace" # replace | merge | regex
                meta: { when: "always" }
            content: |
              {
                "backup_device_uuid": "{% if key_components.backup.timeshift.vars.backup_device_uuid == 'auto' %}{{ tmp_backup_device_uuid.stdout | trim }}{% else %}{{ key_components.backup.timeshift.vars.backup_device_uuid }}{% endif %}",
                "parent_device_uuid": "",

                "do_first_run": "false",

                "btrfs_mode": "false",
                "include_btrfs_home_for_backup": "false",
                "include_btrfs_home_for_restore": "false",

                "stop_cron_emails": "true",

                "schedule_monthly": "{{ key_components.backup.timeshift.profiles[key_components.backup.timeshift.tier].schedule_monthly }}",
                "schedule_weekly": "{{ key_components.backup.timeshift.profiles[key_components.backup.timeshift.tier].schedule_weekly }}",
                "schedule_daily": "{{ key_components.backup.timeshift.profiles[key_components.backup.timeshift.tier].schedule_daily }}",
                "schedule_hourly": "false",
                "schedule_boot": "false",

                "count_monthly": "{{ key_components.backup.timeshift.profiles[key_components.backup.timeshift.tier].count_monthly }}",
                "count_weekly": "{{ key_components.backup.timeshift.profiles[key_components.backup.timeshift.tier].count_weekly }}",
                "count_daily": "{{ key_components.backup.timeshift.profiles[key_components.backup.timeshift.tier].count_daily }}",
                "count_hourly": "0",
                "count_boot": "0",

                "date_format": "%Y-%m-%d %H:%M:%S",
                "exclude": {{ key_components.backup.timeshift.vars.exclude_common | to_json }},
                "exclude-apps": []
              }
            validate: "python3 -m json.tool %s"
            notify: ["TIMESHIFT | apply"]
  network:
    stage: 1400
    resolved:
      enabled: true
      uses:
        packages: ["systemd_resolved"]
      tier: "global"
      profiles:
        global:
          dns:
            - "1.1.1.1#cloudflare-dns.com"
            - "1.0.0.1#cloudflare-dns.com"
          fallback_dns:
            - "9.9.9.9#dns.quad9.net"
            - "149.112.112.112#dns.quad9.net"
          dnssec: "allow-downgrade"
          dns_over_tls: "opportunistic"
        ru:
          dns:
            - "94.140.14.14#dns.adguard-dns.com"
            - "94.140.15.15#dns.adguard-dns.com"
          fallback_dns:
            - "77.88.8.8"
            - "77.88.8.1"
          dnssec: "allow-downgrade"
          dns_over_tls: "opportunistic"
        strict:
          dns:
            - "9.9.9.9#dns.quad9.net"
            - "149.112.112.112#dns.quad9.net"
          fallback_dns:
            - "1.1.1.1#cloudflare-dns.com"
            - "1.0.0.1#cloudflare-dns.com"
          dnssec: "yes"
          dns_over_tls: "yes"
      vars:
        stub_listener: true
        cache: true
        llmnr: "no"
        mdns: "no"
        read_etc_hosts: true
        cloud_init_disable_network_config: true
        enforce_no_dhcp_dns: true
      config:
        files:
          resolved_main_resolved_conf:
            use: true
            id: 1
            dir:
              desc: "/etc/systemd"
              owner: "root"
              group: "root"
              mode: "0755"
              apply: { meta: { when: "always" } }
            file:
              desc: "resolved.conf"
              owner: "root"
              group: "root"
              mode: "0644"
              apply:
                content: { when: "exists", mode: "regex" }
                meta: { when: "exists" }
            content: |
              [
                { "id": 1, "regex": "^\\s*DNS\\s*=",              "value": "# DNS= (managed by /etc/systemd/resolved.conf.d/*.conf)" },
                { "id": 2, "regex": "^\\s*FallbackDNS\\s*=",      "value": "# FallbackDNS= (managed by /etc/systemd/resolved.conf.d/*.conf)" },
                { "id": 3, "regex": "^\\s*DNSStubListener\\s*=",  "value": "# DNSStubListener= (managed by /etc/systemd/resolved.conf.d/*.conf)" },
                { "id": 4, "regex": "^\\s*Cache\\s*=",            "value": "# Cache= (managed by /etc/systemd/resolved.conf.d/*.conf)" },
                { "id": 5, "regex": "^\\s*DNSSEC\\s*=",           "value": "# DNSSEC= (managed by /etc/systemd/resolved.conf.d/*.conf)" },
                { "id": 6, "regex": "^\\s*DNSOverTLS\\s*=",       "value": "# DNSOverTLS= (managed by /etc/systemd/resolved.conf.d/*.conf)" },
                { "id": 7, "regex": "^\\s*LLMNR\\s*=",            "value": "# LLMNR= (managed by /etc/systemd/resolved.conf.d/*.conf)" },
                { "id": 8, "regex": "^\\s*MulticastDNS\\s*=",     "value": "# MulticastDNS= (managed by /etc/systemd/resolved.conf.d/*.conf)" },
                { "id": 9, "regex": "^\\s*ReadEtcHosts\\s*=",     "value": "# ReadEtcHosts= (managed by /etc/systemd/resolved.conf.d/*.conf)" }
              ]
            validate: "/usr/bin/python3 -c \"import configparser,sys; p=configparser.ConfigParser(); p.read(sys.argv[1])\" %s"
            notify: ["RESOLVED | apply"]
          resolved_910_resolved_dns_conf:
            use: true
            id: 2
            dir:
              desc: "/etc/systemd/resolved.conf.d"
              owner: "root"
              group: "root"
              mode: "0755"
              apply: { meta: { when: "always" } }
            file:
              desc: "910_resolved_dns.conf"
              owner: "root"
              group: "root"
              mode: "0644"
              apply:
                content: { when: "always", mode: "replace" }
                meta: { when: "always" }
            content: |
              [Resolve]
              DNS={{ key_components.network.resolved.profiles[key_components.network.resolved.tier].dns | join(' ') }}
              FallbackDNS={{ key_components.network.resolved.profiles[key_components.network.resolved.tier].fallback_dns | join(' ') }}
              Domains=~.
              DNSStubListener={{ 'yes' if key_components.network.resolved.vars.stub_listener else 'no' }}
              Cache={{ 'yes' if key_components.network.resolved.vars.cache else 'no' }}
              DNSSEC={{ key_components.network.resolved.profiles[key_components.network.resolved.tier].dnssec }}
              DNSOverTLS={{ key_components.network.resolved.profiles[key_components.network.resolved.tier].dns_over_tls }}
              LLMNR={{ key_components.network.resolved.vars.llmnr }}
              MulticastDNS={{ key_components.network.resolved.vars.mdns }}
              ReadEtcHosts={{ 'yes' if key_components.network.resolved.vars.read_etc_hosts else 'no' }}
            validate: "/usr/bin/python3 -c \"import configparser,sys; p=configparser.ConfigParser(); p.read(sys.argv[1])\" %s"
            notify: ["RESOLVED | apply"]
    wireguard:
      enabled: false
      uses:
        packages: ["wireguard"]
      tier: "server"
