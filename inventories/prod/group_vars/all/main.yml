          wireguard_iptables_910_wireguard_rules_v4_nat_rules:
            "{{ key_components.firewall.iptables.config.files.wireguard_iptables_910_wireguard_rules_v4_nat_rules}}"
          wireguard_iptables_910_wireguard_rules_v4_mangle_rules:
            "{{ key_components.firewall.iptables.config.files.wireguard_iptables_910_wireguard_rules_v4_mangle_rules}}"
    singbox:
