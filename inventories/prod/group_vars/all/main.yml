              desc: "/etc/wireguard"
              owner: "root"
              group: "root"
              mode: "0700"
              apply: { meta: { when: "always" } }
            file:
              desc: "wg0.conf"
              owner: "root"
              group: "root"
              mode: "0600"
              apply:
                content: { when: "always", mode: "replace" }
                meta: { when: "always" }
            log: false
            content: |
              [Interface]
              Address = {{ key_components.network.wireguard.profiles.server.interface.address }}
              PrivateKey = {{ key_components.network.wireguard.profiles.server.interface.private_key }}
              ListenPort = {{ key_components.network.wireguard.profiles.server.interface.listen_port }}

              {% for peer in key_components.network.wireguard.profiles.server.peers %}
              [Peer]
              PublicKey = {{ peer.public_key }}
              {% if peer.preshared_key is defined and (peer.preshared_key | trim | length) > 0 %}
              PresharedKey = {{ peer.preshared_key }}
              {% endif %}
              AllowedIPs = {{ peer.allowed_ips | join(',') }}
              {% if peer.persistent_keepalive is defined and (peer.persistent_keepalive | int) > 0 %}
              PersistentKeepalive = {{ peer.persistent_keepalive }}
              {% endif %}

              {% endfor %}
            notify: ["WIREGUARD | apply"]
          wireguard_client_main_wg0_conf:
            use: "{{ key_components.network.wireguard.tier == 'client' }}"
            id: 2
            dir:
              desc: "/etc/wireguard"
              owner: "root"
              group: "root"
              mode: "0700"
              apply: { meta: { when: "always" } }
            file:
              desc: "wg0.conf"
              owner: "root"
              group: "root"
              mode: "0600"
              apply:
                content: { when: "always", mode: "replace" }
                meta: { when: "always" }
            log: false
            content: |
              [Interface]
              Address = {{ key_components.network.wireguard.profiles.client.interface.address }}
              PrivateKey = {{ key_components.network.wireguard.profiles.client.interface.private_key }}
              {% if key_components.network.wireguard.profiles.client.interface.mtu is defined %}
