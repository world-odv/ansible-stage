      enabled: false
  platform_edge:
    stage: 3000
    certbot:
      enabled: false
      uses:
        packages: ["certbot", "python3_pip", "acl"]
      vars:
        # cert_name определяет lineage в /etc/letsencrypt/live/<cert_name>/...
        # Его значение должно соответствовать путям сертификата в key_components.platform_edge.envoy.vars.tls
        cert_name: "asterno.com"
        email: "security@asterno.com"
        acme_server: "https://acme-v02.api.letsencrypt.org/directory"
        dns_propagation_seconds: 180
        domains: ["asterno.com", "*.asterno.com"]
        beget:
          username: "vault.yml"
          password: "vault.yml"
        paths:
          credentials: "/etc/letsencrypt/dns_beget.ini"
          deploy_hook: "/etc/letsencrypt/renewal-hooks/deploy/reload_envoy.sh"
        timer:
          on_calendar: "*-*-* 03,15:00:00"
          randomized_delay_sec: 300
          persistent: true
        log_dir: "/var/log/letsencrypt"
      config:
        files:
          certbot_main_dns_beget_ini:
            use: true
            id: 1
            dir:
              desc: "/etc/letsencrypt"
              owner: "root"
              group: "root"
              mode: "0755"
              apply:
                meta: { when: "always" }
            file:
              desc: "dns_beget.ini"
              owner: "root"
              group: "root"
              mode: "0600"
              apply:
                content: { when: "always", mode: "replace" }
                meta: { when: "always" }
            content: |
              dns_beget_api_username = {{ key_components.platform_edge.certbot.vars.beget.username }}
              dns_beget_api_password = {{ key_components.platform_edge.certbot.vars.beget.password }}
            notify: ["CERTBOT | apply"]
            log: false
          certbot_main_certbot_sh:
            use: true
            id: 2
            dir:
              desc: "/usr/local/bin"
              owner: "root"
              group: "root"
              mode: "0755"
              apply:
                meta: { when: "always" }
            file:
              desc: "certbot.sh"
              owner: "root"
              group: "root"
              mode: "0750"
              apply:
                content: { when: "always", mode: "replace" }
                meta: { when: "always" }
            content: |
              #!/usr/bin/env bash
              set -euo pipefail
              # Скрипт выполняет полный цикл:
              # 1. Проверяет наличие credentials
              # 2. Устанавливает DNS-плагин (если его нет)
              # 3. Выпускает сертификат при первом запуске
              # 4. Гарантирует deploy_hook в renewal-конфиге
              # 5. Запускает certbot renew

              PATH="/usr/sbin:/usr/bin:/sbin:/bin"

              CERT_NAME="{{ key_components.platform_edge.certbot.vars.cert_name }}"
              CERT_EMAIL="{{ key_components.platform_edge.certbot.vars.email }}"
              ACME_SERVER="{{ key_components.platform_edge.certbot.vars.acme_server }}"
              PROPAGATION_SECONDS="{{ key_components.platform_edge.certbot.vars.dns_propagation_seconds }}"
              CREDENTIALS_FILE="{{ key_components.platform_edge.certbot.vars.paths.credentials }}"
              DEPLOY_HOOK="{{ key_components.platform_edge.certbot.vars.paths.deploy_hook }}"
              LOG_DIR="{{ key_components.platform_edge.certbot.vars.log_dir }}"
              LOG_FILE="${LOG_DIR}/$(date -u +'%Y').log"
              RENEWAL_CONF="/etc/letsencrypt/renewal/${CERT_NAME}.conf"

              CERTBOT_DOMAIN_ARGS=(
              {% for certbot_domain in key_components.platform_edge.certbot.vars.domains %}
                "-d" "{{ certbot_domain }}"
              {% endfor %}
              )

              mkdir -p "${LOG_DIR}"
              chown root:adm "${LOG_DIR}" || true
              chmod 0755 "${LOG_DIR}" || true

              {
                echo "Start event $(date -u +'%Y-%m-%d %T')"
                echo "platform-edge-certbot: cycle start cert=${CERT_NAME}"

                if [ ! -f "${CREDENTIALS_FILE}" ]; then
                  echo "platform-edge-certbot: missing credentials file ${CREDENTIALS_FILE}"
                  echo "End event $(date -u +'%Y-%m-%d %T')"
                  echo
                  exit 1
                fi

                chmod 0600 "${CREDENTIALS_FILE}" || true

                if ! /usr/bin/python3 -m pip show certbot-dns-beget-api >/dev/null 2>&1; then
                  /usr/bin/pip3 install --upgrade certbot-dns-beget-api
                fi

                if [ ! -f "${RENEWAL_CONF}" ]; then
                  /usr/bin/certbot certonly \
                    --non-interactive \
                    --agree-tos \
                    --no-eff-email \
                    --authenticator dns-beget-api \
                    --dns-beget-api-credentials "${CREDENTIALS_FILE}" \
                    --dns-beget-api-propagation-seconds "${PROPAGATION_SECONDS}" \
                    --server "${ACME_SERVER}" \
                    --cert-name "${CERT_NAME}" \
                    -m "${CERT_EMAIL}" \
                    "${CERTBOT_DOMAIN_ARGS[@]}" \
                    --deploy-hook "${DEPLOY_HOOK}"
                fi

                if [ -f "${RENEWAL_CONF}" ]; then
                  /usr/bin/sed -i '/^deploy_hook = /d' "${RENEWAL_CONF}"
                  /usr/bin/printf 'deploy_hook = %s\n' "${DEPLOY_HOOK}" >> "${RENEWAL_CONF}"
                fi

                /usr/bin/certbot renew --non-interactive

                echo "platform-edge-certbot: cycle complete cert=${CERT_NAME}"
                echo "End event $(date -u +'%Y-%m-%d %T')"
                echo
              } >> "${LOG_FILE}" 2>&1
            validate: "/bin/bash -n %s"
            notify: ["CERTBOT | apply"]
          certbot_main_reload_envoy_sh:
            use: true
            id: 3
            dir:
              desc: "/etc/letsencrypt/renewal-hooks/deploy"
              owner: "root"
              group: "root"
              mode: "0755"
              apply:
                meta: { when: "always" }
            file:
              desc: "reload_envoy.sh"
              owner: "root"
              group: "root"
              mode: "0700"
              apply:
                content: { when: "always", mode: "replace" }
                meta: { when: "always" }
            content: |
              #!/usr/bin/env bash
              set -euo pipefail
              # Deploy-hook применяется только после успешного продления:
              # 1. Выставляет ACL для чтения сертификатов пользователем envoy
              # 2. Валидирует конфиг envoy
              # 3. Безопасно перезапускает/запускает envoy

              PATH="/usr/sbin:/usr/bin:/sbin:/bin"

              CERT_NAME="{{ key_components.platform_edge.certbot.vars.cert_name }}"
              LOG_DIR="{{ key_components.platform_edge.certbot.vars.log_dir }}"
              LOG_FILE="${LOG_DIR}/$(date -u +'%Y').log"
              TAG="certbot-hook"
              LINEAGE="${RENEWED_LINEAGE:-unknown}"
              DOMAINS="${RENEWED_DOMAINS:-unknown}"

              mkdir -p "${LOG_DIR}"
              chown root:adm "${LOG_DIR}" || true
              chmod 0755 "${LOG_DIR}" || true

              {
                echo "Start event $(date -u +'%Y-%m-%d %T')"
                echo "${TAG}: deploy-hook start lineage=${LINEAGE} domains=${DOMAINS}"

                /usr/bin/setfacl -m u:envoy:x /etc/letsencrypt || true
                /usr/bin/setfacl -m u:envoy:x /etc/letsencrypt/live || true
                /usr/bin/setfacl -m u:envoy:x /etc/letsencrypt/archive || true
                /usr/bin/setfacl -m u:envoy:rx "/etc/letsencrypt/live/${CERT_NAME}" || true
                /usr/bin/setfacl -m u:envoy:rx "/etc/letsencrypt/archive/${CERT_NAME}" || true
                /usr/bin/setfacl -m m::rx /etc/letsencrypt || true
                /usr/bin/setfacl -m m::rx /etc/letsencrypt/live || true
                /usr/bin/setfacl -m m::rx /etc/letsencrypt/archive || true
                /usr/bin/setfacl -m m::rx "/etc/letsencrypt/live/${CERT_NAME}" || true
                /usr/bin/setfacl -m m::rx "/etc/letsencrypt/archive/${CERT_NAME}" || true

                shopt -s nullglob
                for cert_file in /etc/letsencrypt/archive/"${CERT_NAME}"/privkey*.pem /etc/letsencrypt/archive/"${CERT_NAME}"/fullchain*.pem; do
                  /usr/bin/setfacl -m u:envoy:r "${cert_file}" || true
                  /usr/bin/setfacl -m m::r "${cert_file}" || true
                done
                shopt -u nullglob

                /usr/bin/setfacl -d -m u:envoy:r "/etc/letsencrypt/archive/${CERT_NAME}" || true
                /usr/bin/setfacl -d -m m::r "/etc/letsencrypt/archive/${CERT_NAME}" || true

                if ! /usr/bin/envoy --mode validate -c /etc/envoy/envoy.yaml >/dev/null 2>&1; then
                  echo "${TAG}: envoy validate failed, skip restart"
                  echo "End event $(date -u +'%Y-%m-%d %T')"
                  echo
                  exit 0
                fi

                if /bin/systemctl is-active --quiet envoy.service; then
                  /bin/systemctl try-reload-or-restart envoy.service || /bin/systemctl restart envoy.service
                  echo "${TAG}: envoy restarted"
                elif /bin/systemctl list-unit-files --type=service | /bin/grep -q '^envoy\.service\b'; then
                  /bin/systemctl start envoy.service
                  echo "${TAG}: envoy started"
                else
                  echo "${TAG}: envoy.service not installed, skip"
                fi

                echo "End event $(date -u +'%Y-%m-%d %T')"
                echo
              } >> "${LOG_FILE}" 2>&1
            validate: "/bin/bash -n %s"
            notify: ["CERTBOT | apply"]
          certbot_main_certbot_service:
            use: true
            id: 4
            dir:
              desc: "/etc/systemd/system"
              owner: "root"
              group: "root"
              mode: "0755"
              apply:
                meta: { when: "always" }
            file:
              desc: "certbot.service"
              owner: "root"
              group: "root"
              mode: "0644"
              apply:
                content: { when: "always", mode: "replace" }
                meta: { when: "always" }
            content: |
              [Unit]
              Description=Certbot Issue/Renew
              Wants=network-online.target
              After=network-online.target

              [Service]
              Type=oneshot
              ExecStart=/usr/local/bin/certbot.sh
              User=root
              Group=root
              NoNewPrivileges=true
              Nice=10
              IOSchedulingClass=idle
            validate: "/usr/bin/systemd-analyze verify %s"
            notify: ["CERTBOT | apply"]
          certbot_main_certbot_timer:
            use: true
            id: 5
            dir:
              desc: "/etc/systemd/system"
              owner: "root"
              group: "root"
              mode: "0755"
              apply:
                meta: { when: "always" }
            file:
              desc: "certbot.timer"
              owner: "root"
              group: "root"
              mode: "0644"
              apply:
                content: { when: "always", mode: "replace" }
                meta: { when: "always" }
            content: |
              [Unit]
              Description=Certbot Timer

              [Timer]
              OnCalendar={{ key_components.platform_edge.certbot.vars.timer.on_calendar }}
              Persistent={{ 'true' if key_components.platform_edge.certbot.vars.timer.persistent else 'false' }}
              RandomizedDelaySec={{ key_components.platform_edge.certbot.vars.timer.randomized_delay_sec }}
              Unit=certbot.service

              [Install]
              WantedBy=timers.target
            validate: "/usr/bin/systemd-analyze verify %s"
            notify: ["CERTBOT | apply"]
    envoy:
      enabled: false
      uses:
        packages: ["envoy", "iptables", "fail2ban"]
      vars:
        bind_address: "0.0.0.0"
        admin_bind_address: "127.0.0.1"
        admin_port: 9901
        cluster_name: "cloud-relay"
