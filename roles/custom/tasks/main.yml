# CUSTOM | TASKS | MAIN

- name: "HELPER VALIDATE CATALOG | maintenance"
  ansible.builtin.include_role:
    name: helpers
    tasks_from: h_catalog_validate.yml
  when: key_catalog.validate | bool

- name: "STAGE FACT | maintenance"
  ansible.builtin.include_role:
    name: helpers
    tasks_from: h_stage.yml
  vars: { stage_role: "custom", stage_value: "{{ key_components.custom.stage }}" }

- name: "FIREFOX | maintenance"
  ansible.builtin.include_role:
    name: helpers
    tasks_from: h_component_setup.yml
  vars: { component_group: "custom", component_name: "firefox" }
  when: key_components.custom.firefox.enabled | bool

- name: "OPERA | maintenance"
  ansible.builtin.include_role:
    name: helpers
    tasks_from: h_component_setup.yml
  vars: { component_group: "custom", component_name: "opera" }
  when: key_components.custom.opera.enabled | bool

- name: "VERACRYPT | maintenance"
  ansible.builtin.include_role:
