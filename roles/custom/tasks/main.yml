- name: "TELEGRAM | maintenance"
  ansible.builtin.include_role:
    name: helpers
    tasks_from: h_component_setup.yml
  vars: { component_group: "custom", component_name: "telegram" }
  when: key_components.custom.telegram.enabled | bool

- name: "VLC | maintenance"
  ansible.builtin.include_role:
    name: helpers
    tasks_from: h_component_setup.yml
  vars: { component_group: "custom", component_name: "vlc" }
