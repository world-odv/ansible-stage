# NETWORK | TASKS | MAIN

- name: "HELPER VALIDATE CATALOG | maintenance"
  ansible.builtin.include_role:
    name: helpers
    tasks_from: h_catalog_validate.yml
  when: key_catalog.validate | bool

- name: "STAGE FACT | maintenance"
  ansible.builtin.include_role:
    name: helpers
    tasks_from: h_stage.yml
  vars: { stage_role: "network", stage_value: "{{ key_components.network.stage }}" }

- name: RESOLVED | maintenance
  ansible.builtin.import_tasks: resolved.yml
  when: key_components.network.resolved.enabled | bool

- name: WIREGUARD | maintenance
  ansible.builtin.import_tasks: wireguard.yml
  when: key_components.network.wireguard.enabled | bool

- name: SINGBOX | maintenance
  ansible.builtin.import_tasks: singbox.yml
  when: key_components.network.singbox.enabled | bool