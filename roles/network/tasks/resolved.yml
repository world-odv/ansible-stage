# NETWORK | TASKS | RESOLVED

- name: "RESOLVED | setup component"
  ansible.builtin.include_role:
    name: helpers
    tasks_from: h_component_setup.yml
  vars:
    component_group: "network"
    component_name: "resolved"

- name: "RESOLVED | enable and start"
  ansible.builtin.systemd:
    name: "systemd-resolved"
    enabled: true
    state: "started"

- name: "RESOLVED | check stub resolv.conf exists"
  ansible.builtin.stat:
    path: "/run/systemd/resolve/stub-resolv.conf"
  register: stub_resolv_conf
  changed_when: false

- name: "RESOLVED | assert stub exists"
  ansible.builtin.assert:
    that:
      - stub_resolv_conf.stat.exists | bool
    fail_msg: "Validation failed: /run/systemd/resolve/stub-resolv.conf is missing"

- name: "RESOLVED | set /etc/resolv.conf symlink to stub"
  ansible.builtin.file:
    src: "/run/systemd/resolve/stub-resolv.conf"
    dest: "/etc/resolv.conf"
    state: "link"
    force: true
  notify: ["RESOLVED | apply"]

# NetworkManager
- name: "RESOLVED | check nmcli exists"
  ansible.builtin.stat:
    path: "/usr/bin/nmcli"
  register: nmcli_bin
  changed_when: false
  failed_when: false

- name: "RESOLVED | NETWORKMANAGER | dns=systemd-resolved"
  community.general.ini_file:
    path: "/etc/NetworkManager/NetworkManager.conf"
    section: "main"
    option: "dns"
    value: "systemd-resolved"
    create: true
    mode: "0644"
  when:
    - key_components.network.resolved.vars.enforce_no_dhcp_dns | bool
    - nmcli_bin.stat.exists | bool
  notify: ["NETWORKMANAGER | apply"]

- name: "RESOLVED | NETWORKMANAGER | rc-manager=symlink"
  community.general.ini_file:
    path: "/etc/NetworkManager/NetworkManager.conf"
    section: "main"
    option: "rc-manager"
    value: "symlink"
    create: true
    mode: "0644"
  when:
    - key_components.network.resolved.vars.enforce_no_dhcp_dns | bool
    - nmcli_bin.stat.exists | bool
  notify: ["NETWORKMANAGER | apply"]

- name: "RESOLVED | NETWORKMANAGER | ensure dispatcher dir"
  ansible.builtin.file:
    path: "/etc/NetworkManager/dispatcher.d"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when:
    - key_components.network.resolved.vars.enforce_no_dhcp_dns | bool
    - nmcli_bin.stat.exists | bool

- name: "RESOLVED | NETWORKMANAGER | install dispatcher (ignore-auto-dns)"
  ansible.builtin.copy:
    dest: "/etc/NetworkManager/dispatcher.d/910-ignore-auto-dns"
    owner: root
    group: root
    mode: "0755"
    content: |
      #!/bin/bash
      # Enforce "ignore auto DNS" for any NM connection.
      # DHCP DNS must not override systemd-resolved global DNS.
      set -euo pipefail

      IFACE="${1:-}"
      ACTION="${2:-}"

      case "${ACTION}" in
        up|dhcp4-change|dhcp6-change|vpn-up) ;;
        *) exit 0 ;;
      esac

      UUID="${CONNECTION_UUID:-}"

      command -v nmcli >/dev/null 2>&1 || exit 0

      if [ -z "${UUID}" ]; then
        UUID="$(nmcli -t -f DEVICE,UUID con show --active | awk -F: -v d="${IFACE}" '$1==d {print $2; exit}')"
      fi

      [ -n "${UUID}" ] || exit 0

      nmcli con mod "${UUID}" ipv4.ignore-auto-dns yes ipv6.ignore-auto-dns yes || true
      nmcli dev reapply "${IFACE}" || true
  when:
    - key_components.network.resolved.vars.enforce_no_dhcp_dns | bool
    - nmcli_bin.stat.exists | bool
  notify: ["NETWORKMANAGER | apply"]

- name: "RESOLVED | flush handlers"
  ansible.builtin.meta: flush_handlers
