# HELPERS | TASKS | HELPER COMPONENT PACKAGE REPO CLEANUP
# vars:
#   repo_name: string
#
# Назначение:
# - безопасно удалить старые/конфликтующие apt source files, keyrings
# - при необходимости подчистить записи в /etc/apt/sources.list
# - подготовить систему к повторному корректному добавлению repo
#
# Почему это важно:
# - APT падает, если один и тот же repo объявлен в нескольких местах
#   с разным Signed-By или разным форматом
# - этот cleanup делает переустановку идемпотентной и самовосстанавливающейся

- name: "HELPER COMPONENT PACKAGE REPO CLEANUP | {{ repo_name }} | load repo config"
  ansible.builtin.set_fact:
    repo_cfg: "{{ key_catalog.repos[repo_name] }}"
  changed_when: false

- name: "HELPER COMPONENT PACKAGE REPO CLEANUP | {{ repo_name }} | validate repo exists"
  ansible.builtin.assert:
    that:
      - key_catalog.repos is defined
      - repo_name in key_catalog.repos
      - repo_cfg is mapping
    fail_msg: "Validation failed: repo config is missing or invalid"

# Инициализируем три набора данных для cleanup:
# - file patterns: какие source-файлы надо искать и удалять
# - keyring patterns: какие keyring-файлы надо искать и удалять
# - extra regexps: какие строки надо удалить из /etc/apt/sources.list
# Зачем:
# - приводим входные данные к нормальной форме
# - используем default([]), чтобы cleanup не падал, если блок cleanup частично отсутствует
- name: "HELPER COMPONENT PACKAGE REPO CLEANUP | {{ repo_name }} | init cleanup patterns"
  ansible.builtin.set_fact:
    repo_cleanup_file_patterns: "{{ repo_cfg.cleanup.files | default([]) }}"
    repo_cleanup_keyring_patterns: "{{ repo_cfg.cleanup.keyrings | default([]) }}"
    repo_cleanup_extra_sources_list_regexps: "{{ repo_cfg.cleanup.sources_list_regexps | default([]) }}"
  changed_when: false

# Автоматически строим regex для /etc/apt/sources.list на основе repo_cfg.uris
# Пример:
# - из https://deb.opera.com/opera-stable/
# - получится что-то вроде .*https://deb\.opera\.com/opera-stable/.*
# Зачем:
# - даже если пользователь не указал sources_list_regexps вручную,
#   мы всё равно можем попытаться вычистить legacy-строки из sources.list
- name: "HELPER COMPONENT PACKAGE REPO CLEANUP | {{ repo_name }} | build auto sources.list regexps from uris"
  ansible.builtin.set_fact:
    repo_cleanup_auto_sources_list_regexps: >-
      {{
        (
          repo_cfg.uris | default([])
          | map('regex_escape')
          | map('regex_replace', '^', '.*')
          | map('regex_replace', '$', '.*')
          | list
        )
      }}
  changed_when: false

# Объединяем:
# - вручную заданные regexps
# - автоматически построенные regexps
# Затем чистим пустые значения и убираем дубликаты
# Зачем:
# - получить единый список правил для очистки /etc/apt/sources.list
- name: "HELPER COMPONENT PACKAGE REPO CLEANUP | {{ repo_name }} | combine sources.list regexps"
  ansible.builtin.set_fact:
    repo_cleanup_sources_list_regexps: >-
      {{
        (
          repo_cleanup_extra_sources_list_regexps
          + repo_cleanup_auto_sources_list_regexps
        )
        | map('trim')
        | reject('equalto', '')
        | list
        | unique
      }}
  changed_when: false

# Разворачиваем glob-маски source-файлов в реальные пути
# Используем bash + compgen -G, потому что:
# - у нас абсолютные glob patterns
# - find с ними работает неудобно и неточно
# Зачем:
# - получить точный список файлов, которые реально существуют на хосте
# - не трогать ничего лишнего
- name: "HELPER COMPONENT PACKAGE REPO CLEANUP | {{ repo_name }} | expand legacy source file globs"
  ansible.builtin.shell: |
    set -o nounset
    shopt -s nullglob
    for p in {{ repo_cleanup_file_patterns | map('quote') | join(' ') }}; do
      compgen -G "$p" || true
    done | sort -u
  args:
    executable: /bin/bash
  register: repo_cleanup_source_files_cmd
  changed_when: false
  when: (repo_cleanup_file_patterns | length) > 0

# Преобразуем stdout предыдущего shell task в нормальный список путей
# Зачем:
# - дальше с этим списком работает обычный loop
- name: "HELPER COMPONENT PACKAGE REPO CLEANUP | {{ repo_name }} | build legacy source files list"
  ansible.builtin.set_fact:
    repo_cleanup_source_files: "{{ repo_cleanup_source_files_cmd.stdout_lines | default([]) }}"
  changed_when: false

# Удаляем найденные source files
# Примеры:
# - old .list
# - old .sources
# - старые autogenerated файлы
# Зачем:
# - убрать дубли и конфликты repo definition до нового setup
- name: "HELPER COMPONENT PACKAGE REPO CLEANUP | {{ repo_name }} | remove legacy source files"
  ansible.builtin.file:
    path: "{{ source_file_item }}"
    state: absent
  loop: "{{ repo_cleanup_source_files | default([]) }}"
  loop_control:
    loop_var: source_file_item
    label: "rm={{ source_file_item }}"
  when: (repo_cleanup_source_files | default([]) | length) > 0

# Разворачиваем glob-маски keyring-файлов в реальные пути
# Зачем:
# - старые keyring-файлы тоже могут вызывать конфликты Signed-By
# - особенно если раньше ключ лежал в другом месте
- name: "HELPER COMPONENT PACKAGE REPO CLEANUP | {{ repo_name }} | expand legacy keyring globs"
  ansible.builtin.shell: |
    set -o nounset
    shopt -s nullglob
    for p in {{ repo_cleanup_keyring_patterns | map('quote') | join(' ') }}; do
      compgen -G "$p" || true
    done | sort -u
  args:
    executable: /bin/bash
  register: repo_cleanup_keyring_files_cmd
  changed_when: false
  when: (repo_cleanup_keyring_patterns | length) > 0

- name: "HELPER COMPONENT PACKAGE REPO CLEANUP | {{ repo_name }} | build legacy keyring files list"
  ansible.builtin.set_fact:
    repo_cleanup_keyring_files: "{{ repo_cleanup_keyring_files_cmd.stdout_lines | default([]) }}"
  changed_when: false

- name: "HELPER COMPONENT PACKAGE REPO CLEANUP | {{ repo_name }} | remove legacy keyring files"
  ansible.builtin.file:
    path: "{{ keyring_file_item }}"
    state: absent
  loop: "{{ repo_cleanup_keyring_files | default([]) }}"
  loop_control:
    loop_var: keyring_file_item
    label: "rm={{ keyring_file_item }}"
  when: (repo_cleanup_keyring_files | default([]) | length) > 0

# Проверяем, существует ли /etc/apt/sources.list
# Зачем:
# - на части систем он может отсутствовать или быть заменён другой схемой
# - lineinfile не должен падать на несуществующем файле
- name: "HELPER COMPONENT PACKAGE REPO CLEANUP | {{ repo_name }} | check /etc/apt/sources.list"
  ansible.builtin.stat:
    path: /etc/apt/sources.list
  register: repo_cleanup_sources_list_stat

# Удаляем legacy-строки из /etc/apt/sources.list по regex
# Зачем:
# - некоторые старые установки или ручные правки пишут repo не в sources.list.d,
#   а прямо в /etc/apt/sources.list
# - если это не почистить, APT может оставаться сломанным даже после удаления файлов в sources.list.d
- name: "HELPER COMPONENT PACKAGE REPO CLEANUP | {{ repo_name }} | remove legacy entries from /etc/apt/sources.list"
  ansible.builtin.lineinfile:
    path: /etc/apt/sources.list
    regexp: "{{ sources_list_regexp_item }}"
    state: absent
    backrefs: false
  loop: "{{ repo_cleanup_sources_list_regexps | default([]) }}"
  loop_control:
    loop_var: sources_list_regexp_item
    label: "regexp={{ sources_list_regexp_item }}"
  when:
    - repo_cleanup_sources_list_stat.stat.exists | default(false)
    - (repo_cleanup_sources_list_regexps | default([]) | length) > 0
