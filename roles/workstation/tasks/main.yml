# WORKSTATION | TASKS | MAIN

- name: "HELPER VALIDATE CATALOG | maintenance"
  ansible.builtin.include_role:
    name: helpers
    tasks_from: h_catalog_validate.yml
  when: key_catalog.validate | bool

- name: "STAGE FACT | maintenance"
  ansible.builtin.include_role:
    name: helpers
    tasks_from: h_stage.yml
  vars: { stage_role: "workstation", stage_value: "{{ key_components.workstation.stage }}" }

- name: "NEXTCLOUD DESKTOP | maintenance"
  ansible.builtin.include_role:
    name: helpers
    tasks_from: h_component_setup.yml
  vars: { component_group: "workstation", component_name: "nextcloud_desktop" }
  when: key_components.workstation.nextcloud_desktop.enabled | bool

- name: "LIBREOFFICE | maintenance"
  ansible.builtin.include_role:
    name: helpers
    tasks_from: h_component_setup.yml
  vars: { component_group: "workstation", component_name: "libreoffice" }
  when: key_components.workstation.libreoffice.enabled | bool

- name: "VISUAL STUDIO CODE | maintenance"
  ansible.builtin.include_role:
    name: helpers
    tasks_from: h_component_setup.yml
  vars: { component_group: "workstation", component_name: "visual_studio_code" }
  when: key_components.workstation.visual_studio_code.enabled | bool

- name: "ANSIBLE | maintenance"
  ansible.builtin.include_role:
    name: helpers
    tasks_from: h_component_setup.yml
  vars: { component_group: "workstation", component_name: "ansible" }
  when: key_components.workstation.ansible.enabled | bool