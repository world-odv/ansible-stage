# REMOTE | TASKS | MAIN

- name: "HELPER VALIDATE CATALOG | maintenance"
  ansible.builtin.include_role:
    name: helpers
    tasks_from: h_catalog_validate.yml
  when: key_catalog.validate | bool

- name: "STAGE FACT | maintenance"
  ansible.builtin.include_role:
    name: helpers
    tasks_from: h_stage.yml
  vars: { stage_role: "remote", stage_value: "{{ key_components.remote.stage }}" }

- name: "SSH | maintenance"
  ansible.builtin.import_tasks: ssh.yml
  when: key_components.remote.ssh.enabled | bool

- name: "SSH CLIENT | maintenance"
  ansible.builtin.import_tasks: ssh_client.yml
  when: key_components.remote.ssh_client.enabled | bool