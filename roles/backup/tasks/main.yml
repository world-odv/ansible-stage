# BACKUP | TASKS | MAIN

- name: "HELPER VALIDATE CATALOG | maintenance"
  ansible.builtin.include_role:
    name: helpers
    tasks_from: h_catalog_validate.yml
  when: key_catalog.validate | bool

- name: "STAGE FACT | maintenance"
  ansible.builtin.include_role:
    name: helpers
    tasks_from: h_stage.yml
  vars: { stage_role: "backup", stage_value: "{{ key_components.backup.stage }}" }

- name: TIMESHIFT | maintenance
  ansible.builtin.import_tasks: timeshift.yml
  vars: { component_group: "backup", component_name: "timeshift" }
  when: key_components.backup.timeshift.enabled | bool