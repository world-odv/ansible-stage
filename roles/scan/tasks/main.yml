# SCAN | TASKS | MAIN

- name: "HELPER VALIDATE CATALOG | maintenance"
  ansible.builtin.include_role:
    name: helpers
    tasks_from: h_catalog_validate.yml
  when: key_catalog.validate | bool

- name: "STAGE FACT | maintenance"
  ansible.builtin.include_role:
    name: helpers
    tasks_from: h_stage.yml
  vars: { stage_role: "scan", stage_value: "{{ key_components.scan.stage }}" }

- name: "CLAMAV | maintenance"
  ansible.builtin.import_tasks: clamav.yml
  when: key_components.scan.clamav.enabled | bool